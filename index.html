<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Calc & Ultimate Hub</title>
    <style>
        /* --- TI-30XIIS STEALTH STYLE --- */
        :root {
            --bg-color: #f4f4f9;
            --calc-body: #1e2124; /* Dark plastic */
            --screen-bg: #c5d1c5; /* LCD green-grey */
            --btn-blue: #5d7fa3;  /* 2nd and Enter keys */
            --btn-black: #2a2a2a; /* Numbers */
            --btn-nav: #444;      /* Arrow keys */
            --btn-op: #3d4e5f;    /* Operators */
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            font-family: Arial, sans-serif;
            transition: background 0.3s;
            overflow-x: hidden;
        }

        #calc-ui {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Tapered Body Shape */
        .calculator {
            background-color: var(--calc-body);
            padding: 25px 20px 45px 20px;
            border-radius: 20px 20px 60px 60px; 
            box-shadow: 0px 12px 0px #000;
            width: 340px;
            border: 2px solid #333;
        }

        .brand {
            color: #ccc;
            font-size: 11px;
            text-align: center;
            margin-bottom: 12px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        #display {
            width: 100%;
            height: 85px;
            background-color: var(--screen-bg);
            color: #222;
            border: 4px inset #888;
            border-radius: 5px;
            margin-bottom: 20px;
            padding: 10px;
            box-sizing: border-box;
            text-align: right;
            font-size: 1.5rem;
            font-family: 'Courier New', Courier, monospace;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.3);
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        button.calc-btn {
            padding: 12px 2px;
            font-size: 0.75rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
            background-color: var(--btn-black);
            box-shadow: 0px 3px 0px #000;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.1s;
        }

        button.calc-btn:active {
            transform: translateY(2px);
            box-shadow: 0px 1px 0px #000;
        }

        /* Specific Key Styling */
        .blue-btn { background-color: var(--btn-blue) !important; }
        .nav-btn { background-color: var(--btn-nav) !important; border-radius: 50% !important; font-size: 1rem !important; }
        .op-btn { background-color: var(--btn-op) !important; }
        .clr-btn { background-color: #c0392b !important; }

        /* --- GAME HUB STYLES --- */
        #hub-container {
            display: none;
            background: #0b0b0b;
            color: white;
            min-height: 100vh;
        }
        #topbar {
            position: sticky;
            top: 0;
            background: #111;
            padding: 15px;
            text-align: center;
            z-index: 1000;
            border-bottom: 1px solid #333;
        }
        #search {
            width: 80%;
            max-width: 400px;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin-top: 10px;
            font-size: 16px;
            background: #222;
            color: white;
        }
        #categories { margin-top: 15px; }
        .cat-btn {
            margin: 3px;
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #00ffcc;
            color: #000;
            font-weight: bold;
        }
        #grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .game {
            background: #1a1a1a;
            padding: 25px 15px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            border: 1px solid #333;
            font-weight: bold;
        }
        .game:hover { border-color: #00ffcc; transform: translateY(-3px); }
        #player {
            display: none;
            position: fixed;
            inset: 0;
            background: black;
            z-index: 2000;
        }
        iframe { width: 100%; height: 100%; border: none; }
        #closeBtn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff4444;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div id="calc-ui">
    <div class="calculator">
        <div class="brand">TEXAS INSTRUMENTS TI-30XIIS</div>
        <input type="text" id="display" placeholder="0" readonly>
        
        <div class="buttons">
            <button class="calc-btn blue-btn" onclick="toggleSecret()">2nd</button>
            <button class="calc-btn nav-btn">◀</button>
            <button class="calc-btn nav-btn">▲</button>
            <button class="calc-btn nav-btn">▼</button>
            <button class="calc-btn nav-btn">▶</button>

            <button class="calc-btn op-btn">log</button>
            <button class="calc-btn op-btn">sin</button>
            <button class="calc-btn op-btn">cos</button>
            <button class="calc-btn op-btn">tan</button>
            <button class="calc-btn clr-btn" onclick="clearDisplay()">CLR</button>

            <button class="calc-btn" onclick="appendToDisplay('7')">7</button>
            <button class="calc-btn" onclick="appendToDisplay('8')">8</button>
            <button class="calc-btn" onclick="appendToDisplay('9')">9</button>
            <button class="calc-btn op-btn" onclick="appendToDisplay('/')">÷</button>
            <button class="calc-btn op-btn" onclick="appendToDisplay('*')">×</button>

            <button class="calc-btn" onclick="appendToDisplay('4')">4</button>
            <button class="calc-btn" onclick="appendToDisplay('5')">5</button>
            <button class="calc-btn" onclick="appendToDisplay('6')">6</button>
            <button class="calc-btn op-btn" onclick="appendToDisplay('-')">−</button>
            <button class="calc-btn op-btn" onclick="appendToDisplay('+')">+</button>

            <button class="calc-btn" onclick="appendToDisplay('1')">1</button>
            <button class="calc-btn" onclick="appendToDisplay('2')">2</button>
            <button class="calc-btn" onclick="appendToDisplay('3')">3</button>
            <button class="calc-btn blue-btn" onclick="calculate()" style="grid-row: span 2; height: 100%;">ENTER</button>
            <button class="calc-btn op-btn" onclick="appendToDisplay('(')">(</button>

            <button class="calc-btn" onclick="appendToDisplay('0')">0</button>
            <button class="calc-btn" onclick="appendToDisplay('.')">.</button>
            <button class="calc-btn op-btn" onclick="appendToDisplay('**')">^</button>
            <button class="calc-btn op-btn" onclick="appendToDisplay(')')">)</button>
        </div>
    </div>
</div>

<div id="hub-container">
    <div id="topbar">
        <h2 style="margin: 0; color: #00ffcc;">🎮 Game Hub</h2>
        <input id="search" placeholder="Search for a game..." onkeyup="filterGames()">
        <div id="categories">
            <button class="cat-btn" onclick="setCategory('All')">All</button>
            <button class="cat-btn" onclick="setCategory('Action')">Action</button>
            <button class="cat-btn" onclick="setCategory('Racing')">Racing</button>
            <button class="cat-btn" onclick="setCategory('Shooter')">Shooter</button>
            <button class="cat-btn" onclick="setCategory('Puzzle')">Puzzle</button>
        </div>
    </div>
    <div id="grid"></div>
    <div id="player">
        <button id="closeBtn" onclick="closeGame()">EXIT GAME</button>
        <iframe id="frame" allowfullscreen></iframe>
    </div>
</div>

<script>
let allGames = [];
let currentIndex = 0;
let currentCategory = "All";
const display = document.getElementById('display');
const calcUI = document.getElementById('calc-ui');
const hub = document.getElementById('hub-container');
const grid = document.getElementById("grid");

// --- DATA FETCHING ---
async function fetchGames() {
    try {
        const response = await fetch('games.json');
        const data = await response.json();
        allGames = data;
        resetGrid();
    } catch (error) {
        console.error("Error loading games.json:", error);
    }
}

// --- CALCULATOR LOGIC ---
function appendToDisplay(v) { display.value += v; }
function clearDisplay() { display.value = ""; }

function calculate() {
    if (display.value === "1234") {
        openHub();
    } else {
        try { 
            // Standardizing the input for JS eval
            let result = eval(display.value.replace('÷', '/').replace('×', '*'));
            display.value = result;
        } catch(e) { display.value = "Error"; }
    }
}

// PANIC KEY [ESC]
window.addEventListener('keydown', (e) => {
    if (e.key === "Escape") {
        closeGame();
        hub.style.display = "none";
        calcUI.style.display = "flex";
        display.value = "";
        document.body.style.backgroundColor = "var(--bg-color)";
    }
});

// --- HUB LOGIC ---
function openHub() {
    calcUI.style.display = "none";
    hub.style.display = "block";
    document.body.style.backgroundColor = "#0b0b0b";
    fetchGames();
}

function loadMoreGames() {
    const searchVal = document.getElementById("search").value.toLowerCase();
    const filtered = allGames.filter(g => 
        (currentCategory === "All" || g.cat === currentCategory) &&
        g.name.toLowerCase().includes(searchVal)
    );
    
    const chunk = filtered.slice(currentIndex, currentIndex + 20);
    chunk.forEach(game => {
        const div = document.createElement("div");
        div.className = "game";
        div.innerText = game.name;
        div.onclick = () => openGame(game.url);
        grid.appendChild(div);
    });
    currentIndex += 20;
}

function resetGrid() {
    grid.innerHTML = "";
    currentIndex = 0;
    loadMoreGames();
}

function filterGames() { resetGrid(); }
function setCategory(cat) { currentCategory = cat; resetGrid(); }

function openGame(url) {
    document.getElementById("player").style.display = "block";
    document.getElementById("frame").src = url;
}

function closeGame() {
    document.getElementById("player").style.display = "none";
    document.getElementById("frame").src = "";
}

window.addEventListener("scroll", () => {
    if (hub.style.display === "block") {
        if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 500) {
            loadMoreGames();
        }
    }
});
</script>
</body>
</html>
