<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Calc & Ultimate Hub</title>
    <style>
        /* --- CALCULATOR & THEME STYLES --- */
        :root {
            --bg-color: #f4f4f9;
            --calc-bg: #333;
            --text-color: #333;
            --btn-bg: #555;
            --accent: #f39c12;
        }
        body.code-mode {
            --bg-color: #0a0a0a;
            --calc-bg: #1a1a1a;
            --text-color: #00ff41;
            --btn-bg: #222;
            --accent: #008f11;
        }
        body {
            margin: 0;
            background-color: var(--bg-color);
            font-family: Arial, sans-serif;
            transition: background 0.3s;
            overflow-x: hidden;
        }
        #calc-ui {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .calculator {
            background-color: var(--calc-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
            width: 320px;
        }
        #display {
            width: 100%;
            height: 60px;
            font-size: 1.5rem;
            text-align: right;
            margin-bottom: 15px;
            padding: 10px;
            box-sizing: border-box;
            border-radius: 5px;
            background: #222;
            color: var(--text-color);
            border: 1px solid #444;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        button.calc-btn {
            padding: 15px;
            font-size: 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background-color: var(--btn-bg);
            color: white;
        }
        .operator { background-color: var(--accent); }

        /* --- GAME HUB STYLES --- */
        #hub-container {
            display: none;
            background: #0b0b0b;
            color: white;
            min-height: 100vh;
        }
        #topbar {
            position: sticky;
            top: 0;
            background: #111;
            padding: 15px;
            text-align: center;
            z-index: 1000;
            border-bottom: 1px solid #333;
        }
        #search {
            width: 80%;
            max-width: 400px;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin-top: 10px;
            font-size: 16px;
            background: #222;
            color: white;
        }
        #categories { margin-top: 15px; }
        .cat-btn {
            margin: 3px;
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #00ffcc;
            font-weight: bold;
            transition: 0.2s;
        }
        .cat-btn:hover { background: #00ccaa; }
        
        #grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .game {
            background: #1a1a1a;
            padding: 25px 15px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
            border: 1px solid #333;
            font-weight: bold;
        }
        .game:hover { 
            background: #222; 
            transform: translateY(-5px);
            border-color: #00ffcc;
        }
        
        /* --- PLAYER & PANIC --- */
        #player {
            display: none;
            position: fixed;
            inset: 0;
            background: black;
            z-index: 2000;
        }
        iframe { width: 100%; height: 100%; border: none; }
        #closeBtn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff4444;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
        }
        .panic-info {
            font-size: 11px;
            color: #888;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="calc-ui">
    <button onclick="toggleMode()" style="margin-bottom: 15px; cursor: pointer; color: var(--text-color); background: none; border: 1px solid var(--accent); padding: 8px 20px; border-radius: 20px; font-weight: bold;">TOGGLE STYLE</button>
    <div class="calculator">
        <input type="text" id="display" placeholder="0" readonly>
        <div class="buttons">
            <button class="calc-btn" onclick="clearDisplay()" style="grid-column: span 2; background: #c0392b;">CLEAR</button>
            <button class="calc-btn operator" onclick="appendToDisplay('/')">/</button>
            <button class="calc-btn operator" onclick="appendToDisplay('*')">×</button>
            <button class="calc-btn" onclick="appendToDisplay('7')">7</button>
            <button class="calc-btn" onclick="appendToDisplay('8')">8</button>
            <button class="calc-btn" onclick="appendToDisplay('9')">9</button>
            <button class="calc-btn operator" onclick="appendToDisplay('-')">-</button>
            <button class="calc-btn" onclick="appendToDisplay('4')">4</button>
            <button class="calc-btn" onclick="appendToDisplay('5')">5</button>
            <button class="calc-btn" onclick="appendToDisplay('6')">6</button>
            <button class="calc-btn operator" onclick="appendToDisplay('+')">+</button>
            <button class="calc-btn" onclick="appendToDisplay('1')">1</button>
            <button class="calc-btn" onclick="appendToDisplay('2')">2</button>
            <button class="calc-btn" onclick="appendToDisplay('3')">3</button>
            <button class="calc-btn operator" onclick="calculate()">=</button>
            <button class="calc-btn" onclick="appendToDisplay('0')" style="grid-column: span 3;">0</button>
            <button class="calc-btn" onclick="appendToDisplay('.')">.</button>
        </div>
    </div>
    <div class="panic-info">SECRET BYPASS ACTIVE | PANIC KEY: [ESC]</div>
</div>

<div id="hub-container">
    <div id="topbar">
        <h2 style="margin: 0; color: #00ffcc;">🎮 Game Hub</h2>
        <input id="search" placeholder="Search for a game..." onkeyup="filterGames()">
        <div id="categories">
            <button class="cat-btn" onclick="setCategory('All')">All</button>
            <button class="cat-btn" onclick="setCategory('Action')">Action</button>
            <button class="cat-btn" onclick="setCategory('Racing')">Racing</button>
            <button class="cat-btn" onclick="setCategory('Shooter')">Shooter</button>
            <button class="cat-btn" onclick="setCategory('Puzzle')">Puzzle</button>
        </div>
    </div>
    <div id="grid"></div>
    <div id="player">
        <button id="closeBtn" onclick="closeGame()">EXIT GAME</button>
        <iframe id="frame" allowfullscreen></iframe>
    </div>
</div>

<script>
// --- APP STATE ---
let allGames = [];
let currentIndex = 0;
let currentCategory = "All";
const display = document.getElementById('display');
const calcUI = document.getElementById('calc-ui');
const hub = document.getElementById('hub-container');
const grid = document.getElementById("grid");

// --- DATA FETCHING ---
async function fetchGames() {
    try {
        const response = await fetch('games.json');
        const data = await response.json();
        allGames = data;
        resetGrid();
    } catch (error) {
        console.error("Error loading games.json:", error);
    }
}

// --- CALCULATOR & PANIC LOGIC ---
function toggleMode() { document.body.classList.toggle('code-mode'); }
function appendToDisplay(v) { display.value += v; }
function clearDisplay() { display.value = ""; }

function calculate() {
    if (display.value === "1234") {
        openHub();
    } else {
        try { display.value = eval(display.value); } 
        catch(e) { display.value = "Error"; }
    }
}

window.addEventListener('keydown', (e) => {
    if (e.key === "Escape") {
        closeGame();
        hub.style.display = "none";
        calcUI.style.display = "flex";
        display.value = "";
        document.body.style.backgroundColor = "var(--bg-color)";
    }
});

// --- HUB LOGIC ---
function openHub() {
    calcUI.style.display = "none";
    hub.style.display = "block";
    document.body.style.backgroundColor = "#0b0b0b";
    fetchGames(); // Trigger the JSON load
}

function loadMoreGames() {
    const searchVal = document.getElementById("search").value.toLowerCase();
    const filtered = allGames.filter(g => 
        (currentCategory === "All" || g.cat === currentCategory) &&
        g.name.toLowerCase().includes(searchVal)
    );
    
    const chunk = filtered.slice(currentIndex, currentIndex + 20);
    chunk.forEach(game => {
        const div = document.createElement("div");
        div.className = "game";
        div.innerText = game.name;
        div.onclick = () => openGame(game.url);
        grid.appendChild(div);
    });
    currentIndex += 20;
}

function resetGrid() {
    grid.innerHTML = "";
    currentIndex = 0;
    loadMoreGames();
}

function filterGames() { resetGrid(); }
function setCategory(cat) { currentCategory = cat; resetGrid(); }

function openGame(url) {
    document.getElementById("player").style.display = "block";
    document.getElementById("frame").src = url;
}

function closeGame() {
    document.getElementById("player").style.display = "none";
    document.getElementById("frame").src = "";
}

window.addEventListener("scroll", () => {
    if (hub.style.display === "block") {
        if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 500) {
            loadMoreGames();
        }
    }
});
</script>
</body>
</html>
