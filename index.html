<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Calc & Game Hub</title>
    <style>
        /* --- CALCULATOR STYLES --- */
        :root {
            --bg-color: #f4f4f9;
            --calc-bg: #333;
            --text-color: #333;
            --btn-bg: #555;
            --accent: #f39c12;
        }

        body.code-mode {
            --bg-color: #0a0a0a;
            --calc-bg: #1a1a1a;
            --text-color: #00ff41;
            --btn-bg: #222;
            --accent: #008f11;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: Arial, sans-serif;
            margin: 0;
            overflow: hidden;
            transition: background 0.3s;
        }

        #calc-ui {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
        }

        .calculator {
            background-color: var(--calc-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
            width: 320px;
        }

        #display {
            width: 100%;
            height: 60px;
            font-size: 1.5rem;
            text-align: right;
            margin-bottom: 15px;
            padding: 10px;
            box-sizing: border-box;
            border-radius: 5px;
            background: #222;
            color: var(--text-color);
            border: 1px solid #444;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        button.calc-btn {
            padding: 15px;
            font-size: 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background-color: var(--btn-bg);
            color: white;
        }

        .operator { background-color: var(--accent); }

        /* --- GAME HUB STYLES (Your Updated Code) --- */
        #hub-container {
            display: none;
            position: fixed;
            inset: 0;
            background: #0b0b0b;
            color: white;
            z-index: 100;
            overflow-y: auto;
        }

        #topbar {
            position: sticky;
            top: 0;
            background: #111;
            padding: 15px;
            text-align: center;
            z-index: 1000;
        }

        #search {
            width: 80%;
            max-width: 400px;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-top: 10px;
            font-size: 16px;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            padding: 15px;
        }

        .game {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
            border: 1px solid #333;
        }

        .game:hover {
            transform: scale(1.05);
            background: #222;
            border-color: #00ffcc;
        }

        #player {
            display: none;
            position: fixed;
            inset: 0;
            background: black;
            z-index: 2000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        #closeBtn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: red;
            border: none;
            color: white;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 6px;
            z-index: 3000;
            font-weight: bold;
        }

        #exitHub {
            position: absolute;
            left: 10px;
            top: 15px;
            background: #444;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="calc-ui">
    <button onclick="toggleMode()" style="margin-bottom: 10px; cursor: pointer; color: var(--text-color); background: none; border: 1px solid var(--accent); padding: 5px 15px; border-radius: 5px;">CHANGE STYLE</button>
    <div class="calculator">
        <input type="text" id="display" placeholder="0" readonly>
        <div class="buttons">
            <button class="calc-btn" onclick="clearDisplay()" style="grid-column: span 2; background: #c0392b;">CLEAR</button>
            <button class="calc-btn operator" onclick="appendToDisplay('/')">/</button>
            <button class="calc-btn operator" onclick="appendToDisplay('*')">×</button>
            
            <button class="calc-btn" onclick="appendToDisplay('7')">7</button>
            <button class="calc-btn" onclick="appendToDisplay('8')">8</button>
            <button class="calc-btn" onclick="appendToDisplay('9')">9</button>
            <button class="calc-btn operator" onclick="appendToDisplay('-')">-</button>
            
            <button class="calc-btn" onclick="appendToDisplay('4')">4</button>
            <button class="calc-btn" onclick="appendToDisplay('5')">5</button>
            <button class="calc-btn" onclick="appendToDisplay('6')">6</button>
            <button class="calc-btn operator" onclick="appendToDisplay('+')">+</button>
            
            <button class="calc-btn" onclick="appendToDisplay('1')">1</button>
            <button class="calc-btn" onclick="appendToDisplay('2')">2</button>
            <button class="calc-btn" onclick="appendToDisplay('3')">3</button>
            <button class="calc-btn operator" onclick="calculate()">=</button>
            
            <button class="calc-btn" onclick="appendToDisplay('0')" style="grid-column: span 3;">0</button>
            <button class="calc-btn" onclick="appendToDisplay('.')">.</button>
        </div>
    </div>
</div>

<div id="hub-container">
    <div id="topbar">
        <button id="exitHub" onclick="location.reload()">← Back</button>
        <h2>🎮 Game Hub</h2>
        <input id="search" placeholder="Search games..." onkeyup="searchGames()">
    </div>

    <div id="grid"></div>

    <div id="player">
        <button id="closeBtn" onclick="closeGame()">X CLOSE</button>
        <iframe id="frame"></iframe>
    </div>
</div>

<script>
    // --- CALCULATOR JAVASCRIPT ---
    const display = document.getElementById('display');
    const calcUI = document.getElementById('calc-ui');
    const hubContainer = document.getElementById('hub-container');

    function toggleMode() { document.body.classList.toggle('code-mode'); }
    function appendToDisplay(input) { display.value += input; }
    function clearDisplay() { display.value = ""; }

    function calculate() {
        if (display.value === "1234") {
            openHub();
            return;
        }
        try {
            display.value = eval(display.value);
        } catch (e) {
            display.value = "Error";
        }
    }

    // --- GAME HUB JAVASCRIPT ---
    const games = [
        {name: "Crossy Road", url: "https://crossy-road.io/"},
        {name: "Escape Road", url: "https://escaperoad.io/"},
        {name: "Slope", url: "https://slopegame.io/"},
        {name: "Run 3", url: "https://run3.io/"},
        {name: "1v1.LOL", url: "https://1v1.lol/"},
        {name: "Subway Surfers", url: "https://subwaysurfersgame.io/"},
        {name: "Moto X3M", url: "https://motox3m.io/"},
        {name: "Tunnel Rush", url: "https://tunnelrush.io/"},
        {name: "Snow Rider 3D", url: "https://snowrider3d.io/"},
        {name: "Drift Hunters", url: "https://drifthunters.io/"},
        {name: "Basketball Stars", url: "https://basketballstars.io/"},
        {name: "Soccer Random", url: "https://soccerrandom.io/"},
        {name: "Stickman Hook", url: "https://stickmanhook.io/"},
        {name: "Paper.io", url: "https://paper-io.com/"},
        {name: "Shell Shockers", url: "https://shellshock.io/"},
        {name: "Among Us", url: "https://amongusplay.online/"},
        {name: "Temple Run 2", url: "https://templerun2.io/"},
        {name: "Geometry Dash", url: "https://geometrydash.io/"},
        {name: "Zombs Royale", url: "https://zombsroyale.io/"},
        {name: "Krunker", url: "https://krunker.io/"}
    ];

    const grid = document.getElementById("grid");

    function openHub() {
        calcUI.style.display = "none";
        hubContainer.style.display = "block";
        document.body.style.backgroundColor = "#0b0b0b";
        loadGrid(games);
    }

    function loadGrid(list) {
        grid.innerHTML = "";
        list.forEach(game => {
            const div = document.createElement("div");
            div.className = "game";
            div.innerText = game.name;
            div.onclick = () => openGame(game.url);
            grid.appendChild(div);
        });
    }

    function searchGames() {
        const value = document.getElementById("search").value.toLowerCase();
        const filtered = games.filter(g => g.name.toLowerCase().includes(value));
        loadGrid(filtered);
    }

    function openGame(url) {
        document.getElementById("player").style.display = "block";
        document.getElementById("frame").src = url;
    }

    function closeGame() {
        document.getElementById("player").style.display = "none";
        document.getElementById("frame").src = "";
    }
</script>

</body>
</html>
