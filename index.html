<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <input type="text" id="display" readonly>
        </div>
        <div class="buttons">
            <!-- Calculator buttons go here -->
            <button id="btn-delete">C</button>
            <button id="btn-mem-add">M+</button>
            <button id="btn-mem-subtract">M-</button>
            <button id="btn-mem-recall">MR</button>
            <button id="btn-mem-clear">MC</button>
            <!-- Add more buttons for digits and operations -->
        </div>
        <div class="features">
            <button id="btn-history">History</button>
            <button id="btn-dark-mode">Toggle Dark Mode</button>
            <label for="decimal-precision">Decimal Precision:</label>
            <input type="number" id="decimal-precision" min="0" max="10" value="2">
        </div>
    </div>
    <script>
        // JavaScript for functionality, including memory functions, history, timeout, responsive layout, and keyboard support.
        let history = [];
        let memory = 0;
        const maxHistoryItems = 10;

        // Functionality for memory operations
        function memoryAdd(value) { memory += value; }
        function memorySubtract(value) { memory -= value; }
        function memoryRecall() { return memory; }
        function memoryClear() { memory = 0; }

        // Functionality for calculation history
        function addToHistory(calculation) {
            if (history.length >= maxHistoryItems) { history.shift(); }
            history.push(calculation);
        }

        // Responsive layout and dark mode handling
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        // Event listeners for buttons and keyboard support
        document.getElementById('btn-dark-mode').addEventListener('click', toggleDarkMode);
        // Additional setup for keyboard handling
    </script>
</body>
</html>
