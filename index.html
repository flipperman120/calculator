<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacker Calc + Secret</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --calc-bg: #333;
            --text-color: #333;
            --btn-bg: #555;
            --accent: #f39c12;
        }

        body.code-mode {
            --bg-color: #0a0a0a;
            --calc-bg: #1a1a1a;
            --text-color: #00ff41;
            --btn-bg: #222;
            --accent: #008f11;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
        }

        /* Calculator Styles */
        .calculator-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .calculator {
            background-color: var(--calc-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
            width: 320px;
            border: 1px solid #444;
        }

        #display {
            width: 100%;
            height: 60px;
            font-size: 1.2rem;
            text-align: right;
            margin-bottom: 15px;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #444;
            border-radius: 5px;
            background: #222;
            color: var(--text-color);
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        button {
            padding: 15px;
            font-size: 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background-color: var(--btn-bg);
            color: white;
        }

        .operator { background-color: var(--accent); }
        
        /* Secret Game Styles */
        #loader {
            position: fixed;
            inset: 0;
            background: black;
            display: none; /* Hidden by default */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #333;
            border-top: 6px solid #00ffcc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #game-frame {
            display: none;
            width: 100vw;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>

<div id="main-ui" class="calculator-container">
    <button class="mode-toggle" onclick="toggleMode()" style="margin-bottom: 10px; cursor: pointer; border: 1px solid var(--accent); background: none; color: var(--text-color); padding: 5px 10px;">SWITCH MODE</button>
    
    <div class="calculator">
        <input type="text" id="display" placeholder="0" readonly>
        <div class="buttons">
            <button onclick="clearDisplay()" style="grid-column: span 2; background: #c0392b;">C</button>
            <button class="operator" onclick="appendToDisplay('/')">/</button>
            <button class="operator" onclick="appendToDisplay('*')">*</button>
            
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button class="operator" onclick="appendToDisplay('-')">-</button>
            
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button class="operator" onclick="appendToDisplay('+')">+</button>
            
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button class="operator" onclick="calculate()">=</button>
            <button onclick="appendToDisplay('0')" style="grid-column: span 3;">0</button>
            <button onclick="appendToDisplay('.')">.</button>
        </div>
    </div>
</div>

<div id="loader">
    <div class="spinner"></div>
    <p style="color: #00ffcc; margin-top: 20px;">LOADING BYPASS...</p>
</div>

<iframe id="game-frame" src="https://crossy-road.io/"></iframe>

<script>
    const display = document.getElementById('display');
    const mainUI = document.getElementById('main-ui');
    const loader = document.getElementById('loader');
    const gameFrame = document.getElementById('game-frame');

    function toggleMode() {
        document.body.classList.toggle('code-mode');
    }

    function appendToDisplay(input) {
        display.value += input;
    }

    function clearDisplay() {
        display.value = "";
    }

    function calculate() {
        // CHECK FOR SECRET CODE
        if (display.value === "1234") {
            launchSecret();
            return;
        }

        try {
            display.value = eval(display.value);
        } catch (error) {
            display.value = "Error";
        }
    }

    function launchSecret() {
        // Hide calculator
        mainUI.style.display = "none";
        document.body.style.backgroundColor = "black";
        
        // Show loader
        loader.style.display = "flex";

        // Wait 1 second (per your code) then show game
        setTimeout(() => {
            loader.style.display = "none";
            gameFrame.style.display = "block";
        }, 1000);
    }
</script>

</body>
</html>
