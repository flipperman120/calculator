<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Calc & Ultimate Hub</title>
    <style>
        /* --- CALCULATOR STYLES --- */
        :root {
            --bg-color: #f4f4f9;
            --calc-bg: #333;
            --text-color: #333;
            --btn-bg: #555;
            --accent: #f39c12;
        }
        body.code-mode {
            --bg-color: #0a0a0a;
            --calc-bg: #1a1a1a;
            --text-color: #00ff41;
            --btn-bg: #222;
            --accent: #008f11;
        }
        body {
            margin: 0;
            background-color: var(--bg-color);
            font-family: Arial, sans-serif;
            transition: background 0.3s;
        }
        #calc-ui {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .calculator {
            background-color: var(--calc-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
            width: 320px;
        }
        #display {
            width: 100%;
            height: 60px;
            font-size: 1.5rem;
            text-align: right;
            margin-bottom: 15px;
            padding: 10px;
            box-sizing: border-box;
            border-radius: 5px;
            background: #222;
            color: var(--text-color);
            border: 1px solid #444;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        button.calc-btn {
            padding: 15px;
            font-size: 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background-color: var(--btn-bg);
            color: white;
        }
        .operator { background-color: var(--accent); }

        /* --- GAME HUB STYLES (Your Updated Code) --- */
        #hub-container {
            display: none;
            background: #0b0b0b;
            color: white;
            min-height: 100vh;
        }
        #topbar {
            position: sticky;
            top: 0;
            background: #111;
            padding: 15px;
            text-align: center;
            z-index: 1000;
        }
        #search {
            width: 80%;
            max-width: 400px;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-top: 10px;
        }
        #categories { margin-top: 10px; }
        .cat-btn {
            margin: 5px;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #00ffcc;
            font-weight: bold;
        }
        #grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            padding: 15px;
        }
        .game {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }
        .game:hover { background: #222; transform: scale(1.05); }
        #player {
            display: none;
            position: fixed;
            inset: 0;
            background: black;
            z-index: 2000;
        }
        iframe { width: 100%; height: 100%; border: none; }
        #closeBtn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: red;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div id="calc-ui">
    <button onclick="toggleMode()" style="margin-bottom: 10px; cursor: pointer; color: var(--text-color); background: none; border: 1px solid var(--accent); padding: 5px 15px; border-radius: 5px;">CHANGE STYLE</button>
    <div class="calculator">
        <input type="text" id="display" placeholder="0" readonly>
        <div class="buttons">
            <button class="calc-btn" onclick="clearDisplay()" style="grid-column: span 2; background: #c0392b;">CLEAR</button>
            <button class="calc-btn operator" onclick="appendToDisplay('/')">/</button>
            <button class="calc-btn operator" onclick="appendToDisplay('*')">×</button>
            <button class="calc-btn" onclick="appendToDisplay('7')">7</button>
            <button class="calc-btn" onclick="appendToDisplay('8')">8</button>
            <button class="calc-btn" onclick="appendToDisplay('9')">9</button>
            <button class="calc-btn operator" onclick="appendToDisplay('-')">-</button>
            <button class="calc-btn" onclick="appendToDisplay('4')">4</button>
            <button class="calc-btn" onclick="appendToDisplay('5')">5</button>
            <button class="calc-btn" onclick="appendToDisplay('6')">6</button>
            <button class="calc-btn operator" onclick="appendToDisplay('+')">+</button>
            <button class="calc-btn" onclick="appendToDisplay('1')">1</button>
            <button class="calc-btn" onclick="appendToDisplay('2')">2</button>
            <button class="calc-btn" onclick="appendToDisplay('3')">3</button>
            <button class="calc-btn operator" onclick="calculate()">=</button>
            <button class="calc-btn" onclick="appendToDisplay('0')" style="grid-column: span 3;">0</button>
            <button class="calc-btn" onclick="appendToDisplay('.')">.</button>
        </div>
    </div>
    <p style="font-size: 10px; color: #888; margin-top: 20px;">Panic Key: Press [Esc]</p>
</div>

<div id="hub-container">
    <div id="topbar">
        <h2>🎮 Game Hub</h2>
        <input id="search" placeholder="Search..." onkeyup="filterGames()">
        <div id="categories">
            <button class="cat-btn" onclick="setCategory('All')">All</button>
            <button class="cat-btn" onclick="setCategory('Action')">🎮 Action</button>
            <button class="cat-btn" onclick="setCategory('Racing')">🚗 Racing</button>
            <button class="cat-btn" onclick="setCategory('Shooter')">🔫 Shooter</button>
            <button class="cat-btn" onclick="setCategory('Puzzle')">🧠 Puzzle</button>
        </div>
    </div>
    <div id="grid"></div>
    <div id="player">
        <button id="closeBtn" onclick="closeGame()">X CLOSE</button>
        <iframe id="frame"></iframe>
    </div>
</div>

<script>
// --- CALCULATOR & PANIC LOGIC ---
const display = document.getElementById('display');
const calcUI = document.getElementById('calc-ui');
const hub = document.getElementById('hub-container');

function toggleMode() { document.body.classList.toggle('code-mode'); }
function appendToDisplay(v) { display.value += v; }
function clearDisplay() { display.value = ""; }

function calculate() {
    if (display.value === "1234") { openHub(); } 
    else { try { display.value = eval(display.value); } catch(e) { display.value = "Error"; } }
}

// THE PANIC KEY (ESCAPE)
window.addEventListener('keydown', (e) => {
    if (e.key === "Escape") {
        closeGame(); // Stop audio
        hub.style.display = "none";
        calcUI.style.display = "flex";
        display.value = ""; // Clear the evidence
        document.body.style.backgroundColor = "var(--bg-color)";
    }
});

function openHub() {
    calcUI.style.display = "none";
    hub.style.display = "block";
    resetGrid();
}

// --- GAME HUB LOGIC ---
const allGames = [];
const sampleGames = [
    {name:"Crossy Road", url:"https://crossy-road.io/", cat:"Action"},
    {name:"Slope", url:"https://slopegame.io/", cat:"Action"},
    {name:"Drift Hunters", url:"https://drifthunters.io/", cat:"Racing"},
    {name:"Moto X3M", url:"https://motox3m.io/", cat:"Racing"},
    {name:"Shell Shockers", url:"https://shellshock.io/", cat:"Shooter"},
    {name:"Krunker", url:"https://krunker.io/", cat:"Shooter"},
    {name:"2048", url:"https://play2048.co/", cat:"Puzzle"},
    {name:"Sudoku", url:"https://sudoku.com/", cat:"Puzzle"}
];

// Build 100+ game entries
for (let i = 0; i < 15; i++) {
    sampleGames.forEach(g => {
        allGames.push({ name: g.name + " " + (i+1), url: g.url, cat: g.cat });
    });
}

let currentIndex = 0;
let currentCategory = "All";
const grid = document.getElementById("grid");

function loadMoreGames() {
    const filtered = allGames.filter(g => 
        (currentCategory === "All" || g.cat === currentCategory) &&
        g.name.toLowerCase().includes(document.getElementById("search").value.toLowerCase())
    );
    const chunk = filtered.slice(currentIndex, currentIndex + 20);
    chunk.forEach(game => {
        const div = document.createElement("div");
        div.className = "game";
        div.innerText = game.name;
        div.onclick = () => openGame(game.url);
        grid.appendChild(div);
    });
    currentIndex += 20;
}

function resetGrid() {
    grid.innerHTML = "";
    currentIndex = 0;
    loadMoreGames();
}

function filterGames() { resetGrid(); }
function setCategory(cat) { currentCategory = cat; resetGrid(); }

function openGame(url) {
    document.getElementById("player").style.display = "block";
    document.getElementById("frame").src = url;
}

function closeGame() {
    document.getElementById("player").style.display = "none";
    document.getElementById("frame").src = "";
}

window.addEventListener("scroll", () => {
    if (hub.style.display === "block" && window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
        loadMoreGames();
    }
});
</script>
</body>
</html>
